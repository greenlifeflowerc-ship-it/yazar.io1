workflows:
  ios-ipa:
    name: Build iOS IPA

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.yazar.yazario

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Flutter Pub Get
        script: |
          flutter clean
          flutter pub get

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa
