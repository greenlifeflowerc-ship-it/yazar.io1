workflows:
  ios-adhoc:
    name: Build iOS Ad Hoc IPA
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.yazar.yazario

    scripts:
      - name: Check environment
        script: |
          flutter --version
          xcodebuild -version
          pod --version

      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get

      - name: Fix and install iOS Pods
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod deintegrate || true
          pod install --repo-update
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Build Ad Hoc IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
