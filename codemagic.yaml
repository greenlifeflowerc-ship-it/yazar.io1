workflows:
  ios-adhoc:
    name: iOS Ad Hoc IPA
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Fix iOS Pods
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod deintegrate || true
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build Ad Hoc IPA
        script: |
          flutter build ipa --release --export-method ad-hoc

    artifacts:
      - build/ios/ipa/*.ipa
