workflows:
  ios-adhoc:
    name: "YAZAR.IO iOS Ad Hoc IPA"
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: YAZAR_IO_APPLE_KEY

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - "codemagic.yaml"
        certificates:
          - "yazar"

    scripts:
      - name: Get Flutter packages
        script: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Generate Flutter iOS config
        script: |
          FLUTTER_BIN="$(command -v flutter)"
          FLUTTER_ROOT_PATH="$(cd "$(dirname "$FLUTTER_BIN")/.." && pwd)"
          APP_PATH="${CM_BUILD_DIR:-$PWD}"
          BUILD_NUMBER="${PROJECT_BUILD_NUMBER:-1}"

          mkdir -p ios/Flutter

          {
            printf '%s\n' "FLUTTER_ROOT=$FLUTTER_ROOT_PATH"
            printf '%s\n' "FLUTTER_APPLICATION_PATH=$APP_PATH"
            printf '%s\n' "COCOAPODS_PARALLEL_CODE_SIGN=true"
            printf '%s\n' "FLUTTER_TARGET=lib/main.dart"
            printf '%s\n' "FLUTTER_BUILD_DIR=build"
            printf '%s\n' "FLUTTER_BUILD_NAME=1.0.0"
            printf '%s\n' "FLUTTER_BUILD_NUMBER=$BUILD_NUMBER"
            printf '%s\n' "DART_OBFUSCATION=false"
            printf '%s\n' "TRACK_WIDGET_CREATION=false"
            printf '%s\n' "TREE_SHAKE_ICONS=true"
            printf '%s\n' "PACKAGE_CONFIG=.dart_tool/package_config.json"
          } > ios/Flutter/Generated.xcconfig

          {
            printf '%s\n' '#!/bin/sh'
            printf '%s\n' "export FLUTTER_ROOT=\"$FLUTTER_ROOT_PATH\""
            printf '%s\n' "export FLUTTER_APPLICATION_PATH=\"$APP_PATH\""
            printf '%s\n' "export COCOAPODS_PARALLEL_CODE_SIGN=true"
            printf '%s\n' "export FLUTTER_TARGET=\"lib/main.dart\""
            printf '%s\n' "export FLUTTER_BUILD_DIR=\"build\""
            printf '%s\n' "export FLUTTER_BUILD_NAME=\"1.0.0\""
            printf '%s\n' "export FLUTTER_BUILD_NUMBER=\"$BUILD_NUMBER\""
            printf '%s\n' "export DART_OBFUSCATION=false"
            printf '%s\n' "export TRACK_WIDGET_CREATION=false"
            printf '%s\n' "export TREE_SHAKE_ICONS=true"
            printf '%s\n' "export PACKAGE_CONFIG=\".dart_tool/package_config.json\""
          } > ios/Flutter/flutter_export_environment.sh

          chmod +x ios/Flutter/flutter_export_environment.sh

          echo "Generated.xcconfig:"
          cat ios/Flutter/Generated.xcconfig

      - name: Install CocoaPods
        script: |
          cd ios
          pod deintegrate || true
          pod install --repo-update
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Analyze Flutter project
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Ad Hoc IPA
        script: |
          FLUTTER_BIN="$(command -v flutter)"
          FLUTTER_ROOT_PATH="$(cd "$(dirname "$FLUTTER_BIN")/.." && pwd)"
          APP_PATH="${CM_BUILD_DIR:-$PWD}"
          BUILD_NUMBER="${PROJECT_BUILD_NUMBER:-1}"

          mkdir -p ios/Flutter

          if ! grep -q "^FLUTTER_ROOT=" ios/Flutter/Generated.xcconfig; then
            printf '%s\n' "FLUTTER_ROOT=$FLUTTER_ROOT_PATH" >> ios/Flutter/Generated.xcconfig
          fi

          if ! grep -q "^FLUTTER_APPLICATION_PATH=" ios/Flutter/Generated.xcconfig; then
            printf '%s\n' "FLUTTER_APPLICATION_PATH=$APP_PATH" >> ios/Flutter/Generated.xcconfig
          fi

          flutter build ipa --release --no-pub \
            --build-name=1.0.0 \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
