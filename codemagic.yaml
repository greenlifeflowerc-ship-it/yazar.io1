workflows:
  ios-adhoc:
    name: YAZAR.IO iOS Ad Hoc IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: YAZAR_IO_APPLE_KEY

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.yazar.yazario

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Analyze Flutter project
        script: |
          flutter analyze

      - name: Build Ad Hoc IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
