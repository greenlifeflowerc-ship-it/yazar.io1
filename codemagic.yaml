workflows:
  ios-adhoc:
    name: YAZAR.IO iOS Ad Hoc IPA
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: YAZAR_IO_APPLE_KEY

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - codemagic.yaml
        certificates:
          - yazar

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

     _profiles:
          - codemagic.yaml
        certificates:
          - yazar

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install
          cd ..

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles --project ios/Runner.xcodeproj

      - name: Analyze Flutter project
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build Ad Hoc IPA
        script: |
          flutter build ipa --release \
            --build-name=1.0.0 \
            --build-number=$PROJECT_BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
