workflows:
  ios-adhoc:
    name: iOS Ad Hoc IPA
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods

    scripts:
      - name: Clean project
        script: |
          flutter clean
          flutter pub get

      - name: Fix iOS Pods
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod deintegrate || true
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: |
          if [ -d "$CM_PROVISIONING_PROFILE_PATH" ] || [ -n "$CM_CERTIFICATE_PATH" ]; then
            echo "Code signing found. Building signed IPA..."
            flutter build ipa --release --export-method ad-hoc
          else
            echo "No code signing found. Building iOS without codesign..."
            flutter build ios --release --no-codesign
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/iphoneos/Runner.app
      - build/ios/archive/*.xcarchive
